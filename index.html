<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع المبرمجة نورا 🎀</title>
    <style>
        :root { --pink: #ffcce6; --dark-pink: #ff85a2; --soft-white: #fffafa; }
        body { 
            background-color: var(--pink); 
            background-image: url('https://www.transparentpng.com/download/hello-kitty/hello-kitty-simple-png-8.png');
            background-size: 80px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.92);
            padding: 40px 20px; border-radius: 40px;
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.4);
            width: 85%; max-width: 380px; text-align: center;
            border: 5px solid white; position: relative;
        }
        .kitty-top { width: 100px; position: absolute; top: -60px; left: 50%; transform: translateX(-50%); }
        h1 { color: var(--dark-pink); margin-bottom: 5px; font-size: 22px; font-weight: bold; }
        p.desc { color: #666; font-size: 14px; margin-bottom: 20px; }
        textarea {
            width: 100%; height: 150px; border-radius: 20px; border: 2px solid var(--pink);
            padding: 15px; font-size: 16px; outline: none; resize: none; box-sizing: border-box;
            background: var(--soft-white); color: #555;
        }
        textarea:focus { border-color: var(--dark-pink); box-shadow: 0 0 10px rgba(255, 133, 162, 0.2); }
        button {
            background: var(--dark-pink); color: white; border: none; padding: 15px;
            border-radius: 50px; font-size: 18px; cursor: pointer; margin-top: 20px;
            transition: 0.3s; width: 100%; font-weight: bold; box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3);
        }
        button:hover { transform: translateY(-3px); background: #ff5c8a; }
        .footer { margin-top: 25px; font-size: 13px; color: var(--dark-pink); border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://www.transparentpng.com/download/hello-kitty/hello-kitty-simple-png-8.png" class="kitty-top" alt="Hello Kitty">
        
        <h1>المبرمجة نورا 🎀</h1>
        <p class="desc">أرسلي لي رسالة سرية، سأقرأها وحدي! ✨</p>
        
        <textarea id="userMessage" placeholder="اكتبي شيئاً لطيفاً هنا..."></textarea>
        
        <button onclick="sendToTelegram()">إرسال الرسالة 💌</button>
        
        <div class="footer">
            تم البرمجة بواسطة نورا 👩‍💻✨ <br>
            حقوق التصميم محفوظة 🌸
        </div>
    </div>

    <script>
        // المعلومات التي أرسلتِها مدمجة هنا
        const token = "8705535049:AAHcKojIh3solmWRZpx6GVb3YKR3okdil2M";
        const myId = "6439835154";

        function sendToTelegram() {
            const msgInput = document.getElementById("userMessage");
            const message = msgInput.value;

            if (message.trim() === "") {
                alert("لطفاً، اكتبي رسالة قبل الإرسال! 🐾");
                return;
            }

            const url = `https://api.telegram.org/bot/sendMessage`;
            const fullText = `💌 رسالة جديدة وصلت لموقعكِ:\n\n""`;

            fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: myId, text: fullText })
            })
            .then(res => {
                if (res.ok) {
                    alert("وصلت الرسالة لنورا بنجاح! 💞✨");
                    msgInput.value = ""; // مسح النص بعد الإرسال
                } else {
                    alert("خطأ في الإرسال، تأكدي من تفعيل البوت! 😿");
                }
            })
            .catch(err => {
                alert("فشل الاتصال، حاولي مرة أخرى 💔");
            });
        }
    </script>
</body>
</html>
