<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noora's Space 🎀</title>
    <style>
        body { 
            background-color: #fff0f5; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .card {
            background: white; padding: 40px; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.5);
            width: 90%; max-width: 400px; text-align: center;
        }
        h1 { color: #ff69b4; margin-bottom: 20px; }
        textarea {
            width: 100%; height: 120px; border-radius: 15px; border: 2px solid #ffb6c1;
            padding: 15px; font-size: 16px; outline: none; box-sizing: border-box;
        }
        button {
            background: #ff69b4; color: white; border: none; padding: 15px 30px;
            border-radius: 50px; font-size: 18px; cursor: pointer; margin-top: 20px; width: 100%;
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <h1>مرحباً بك 🎀</h1>
        <p>المبرمجة نورا تستقبل رسائلكم</p>
        <textarea id="msg" placeholder="اكتب رسالتك هنا..."></textarea>
        <button onclick="send()">إرسال الرسالة</button>
    </div>

    <script>
        // إعداداتك الثابتة
        const TOKEN = "8705535049:AAHcKojIh3solmWRZpx6GVb3YKR3okdil2M";
        const CHAT_ID = "6439835154";

        function send() {
            const text = document.getElementById('msg').value;
            if(!text) return alert("اكتب شيئاً أولاً!");

            fetch(`https://api.telegram.org/bot/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT_ID, text: text})
            })
            .then(res => {
                if(res.ok) {
                    alert("تم الإرسال يا بطلة! ✨");
                    document.getElementById('msg').value = '';
                } else {
                    alert("فشل! تأكدي من ضغط Start في البوت.");
                }
            })
            .catch(() => alert("خطأ في الاتصال!"));
        }
    </script>
</body>
</html>
